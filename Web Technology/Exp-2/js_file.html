<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart City Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('tn-policy.jpg') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 0;
}

.login-box {
    position: relative;
    z-index: 1;
    background: rgba(0, 0, 0, 0.85);
    padding: 40px;
    width: 320px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 30px #00f7ff;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 20px #00f7ff; }
    to { box-shadow: 0 0 40px #ff00ff; }
}

h2 {
    color: #00f7ff;
    margin-bottom: 10px;
}

.policy-title {
    color: #ffcc00;
    font-size: 14px;
    margin-bottom: 20px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    outline: none;
}

input:focus {
    box-shadow: 0 0 10px #00f7ff;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(90deg, #00f7ff, #ff00ff);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.error {
    color: #ff4d4d;
    font-size: 13px;
    margin-top: 10px;
}

.success {
    color: #00ff88;
    font-size: 14px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>🌆 Smart City Login</h2>
    <div class="policy-title">TN Govt Smart Policy Portal</div>

    <form onsubmit="return validateForm()">
        <input type="email" id="email" placeholder="Enter Gmail ID" required>
        <input type="password" id="password" placeholder="Enter Password" required>
        <button type="submit">LOGIN</button>
        <div id="message"></div>
    </form>
</div>

<script>
function validateForm() {
    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;
    var message = document.getElementById("message");

    message.innerHTML = "";
    message.className = "";

    if (!email.endsWith("@gmail.com")) {
        message.innerHTML = "Email must end with @gmail.com";
        message.className = "error";
        return false;
    }

    if (password.length < 8) {
        message.innerHTML = "Password must be at least 8 characters";
        message.className = "error";
        return false;
    }

    message.innerHTML = "Login Successful! Welcome 🚀";
    message.className = "success";
    return false;
}
</script>

</body>
</html>
